const C={bg:"#0b1120",surface:"#131f35",card:"#1a2a42",border:"#243654",accent:"#f59e0b",red:"#ef4444",redDim:"#450a0a",green:"#22c55e",greenDim:"#052e16",blue:"#3b82f6",blueDim:"#1e3a5f",text:"#e2e8f0",muted:"#64748b"};

function faults(pd){return pd.isolationErrors.length+pd.defectiveDevices.length+pd.powerBalanceOff.length+pd.commErrors.length;}

// ── FIREBASE HELPERS ──
const FB_DOC = "solarData/main"; // separate collection from lager!
let _saveTimer = null;

function fbSave(data){
  if(!window._fbReady) return;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    try{
      const ref = window._fbDoc(window._fbDb, "solarData", "main");
      await window._fbSetDoc(ref, {data: JSON.stringify(data)});
    }catch(e){ console.error("Firebase save error:",e); }
  }, 800);
}

// ── APP ──
function App(){
  const [user,setUser]     = useState(null);
  const [db,setDb]         = useState(null);
  const [syncing,setSyncing] = useState(true);
  const [view,setView]     = useState("home");
  const [plant,setPlant]   = useState(null);
  const [sec,setSec]       = useState(null);
  const skipNext           = useRef(false);

  // Load from Firebase on mount + live updates
  useEffect(()=>{
    const init = ()=>{
      const ref = window._fbDoc(window._fbDb,"solarData","main");
      // realtime listener
      const unsub = window._fbOnSnap(ref, snap=>{
        if(skipNext.current){ skipNext.current=false; return; }
        if(snap.exists()){
          try{ setDb(JSON.parse(snap.data().data)); }catch{}
        } else {
          // first time – write defaults
          setDb(DEFAULT_DB);
          fbSave(DEFAULT_DB);
        }
        setSyncing(false);
      });
      return unsub;
    };

    if(window._fbReady){
      const unsub = init();
      return ()=>unsub();
    } else {
      const h = ()=>{ const unsub=init(); window._unsubFb=unsub; };
      window.addEventListener("fbReady",h,{once:true});
      return ()=>{ window.removeEventListener("fbReady",h); if(window._unsubFb) window._unsubFb(); };
    }
  },[]);

  const setDbAndSave = (newDb)=>{
    skipNext.current = true;
    setDb(newDb);
    fbSave(newDb);
  };

  const updPD = (id,fn) => {
    setDbAndSave({...db, plantData:{...db.plantData,[id]:fn(db.plantData[id])}});
  };

  if(syncing) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,gap:16}}>
      <Icon n="cloud" s={40} c={C.accent}/>
      <div style={{color:C.muted,fontSize:14}}>Verbinde mit Cloud…</div>
    </div>
  );

  if(!user) return <Login onLogin={setUser}/>;
  const pd = plant ? (db.plantData[plant.id]||EMPTY()) : null;

  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {view!=="home"
            ? <button style={btnG} onClick={()=>{if(view==="sub"){setView("detail");setSec(null);}else{setView("home");setPlant(null);}}}><Icon n="back" s={20} c={C.muted}/></button>
            : <Icon n="sun" s={20} c={C.accent}/>
          }
          <span style={{fontWeight:800,fontSize:17,color:C.accent,letterSpacing:"-0.3px"}}>
            {view==="home"?"SmartSolar":view==="detail"?plant?.name:sec?.label}
          </span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:C.green}} title="Cloud verbunden"/>
          <span style={{fontSize:12,color:C.muted}}>{user.name}</span>
          <button style={btnG} onClick={()=>{setUser(null);setView("home");setPlant(null);setSec(null);}}><Icon n="logout" s={16} c={C.muted}/></button>
        </div>
      </div>

      {view==="home"   && <Home db={db} onSelect={p=>{setPlant(p);setView("detail");}} onAdd={name=>{const id=pid(name);setDbAndSave({plants:[...db.plants,{id,name}],plantData:{...db.plantData,[id]:EMPTY()}});}}/>}
      {view==="detail" && plant && <Detail plant={plant} pd={pd}
        onRename={name=>{setDbAndSave({...db,plants:db.plants.map(p=>p.id===plant.id?{...p,name}:p)});setPlant(p=>({...p,name}));}}
        onOpen={s=>{setSec(s);setView("sub");}}
        updPD={fn=>updPD(plant.id,fn)}/>}
      {view==="sub" && plant && sec && <Sub sec={sec} pd={pd} updPD={fn=>updPD(plant.id,fn)}/>}
    </div>
  );
}

// ── LOGIN ──
function Login({onLogin}){
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [show,setShow]=useState(false); const [err,setErr]=useState("");
  const go=()=>{const f=USERS.find(x=>x.username===u.trim()&&x.password===p);if(f)onLogin(f);else setErr("Benutzername oder Passwort falsch.");};
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${C.bg},#0d1f3c)`}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"40px 32px",width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,0.5)"}}>
        <div style={{marginBottom:12}}><Icon n="sun" s={36} c={C.accent}/></div>
        <div style={{fontSize:24,fontWeight:800,color:C.accent,marginBottom:4,letterSpacing:"-0.5px"}}>SmartSolar</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:28}}>Anlagenverwaltung & Störungserfassung</div>
        <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Benutzername</label>
        <input style={inp} value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Benutzername"/>
        <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Passwort</label>
        <div style={{position:"relative",marginBottom:16}}>
          <input style={{...inp,marginBottom:0,paddingRight:46}} type={show?"text":"password"} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Passwort"/>
          <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:show?C.accent:C.muted,padding:0,display:"flex",alignItems:"center"}}>
            <Icon n={show?"eyeOff":"eye"} s={18}/>
          </button>
        </div>
        {err&&<div style={{color:C.red,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",gap:6}}><Icon n="x" s={14} c={C.red}/>{err}</div>}
        <button style={btnP} onClick={go}>Anmelden</button>
      </div>
    </div>
  );
}

// ── HOME ──
function Home({db,onSelect,onAdd}){
  const [name,setName]=useState("");
  const sorted=[...db.plants].sort((a,b)=>a.name.localeCompare(b.name,"de"));
  return (
    <div style={{padding:16}}>
      <div style={{fontSize:12,color:C.muted,marginBottom:12}}>{sorted.length} Anlagen</div>
      {sorted.map(p=>{
        const pd=db.plantData[p.id]||EMPTY(); const f=faults(pd);
        return (
          <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>onSelect(p)}>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>{p.name}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:3}}>Iso: {pd.isolationErrors.length} · Defekt: {pd.defectiveDevices.length} · PB: {pd.powerBalanceOff.length} · Komm: {pd.commErrors.length}</div>
            </div>
            <span style={badge(f)}>{f>0?`${f} Fehler`:"OK"}</span>
          </div>
        );
      })}
      <div style={{marginTop:20,borderTop:`1px solid ${C.border}`,paddingTop:16}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600}}>Neue Anlage</div>
        <div style={{display:"flex",gap:8}}>
          <input style={{...inp,marginBottom:0,flex:1}} value={name} onChange={e=>setName(e.target.value)} placeholder="Anlagenname" onKeyDown={e=>{if(e.key==="Enter"&&name.trim()){onAdd(name.trim());setName("");}}}/>
          <button style={{...btnP,width:"auto",padding:"10px 18px",fontSize:20}} onClick={()=>{if(name.trim()){onAdd(name.trim());setName("");}}}>+</button>
        </div>
      </div>
    </div>
  );
}

// ── DETAIL ──

    {key:"defectiveDevices",label:"Defekte Geräte",        icon:"🔧", count:pd.defectiveDevices.length},

          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {pd.mapsLink&&!editMap&&(
              <a href={pd.mapsLink} target="_blank" rel="noreferrer" style={{background:C.blueDim,color:C.blue,border:`1px solid ${C.blue}`,borderRadius:8,padding:"5px 12px",fontSize:13,fontWeight:700,textDecoration:"none",display:"flex",alignItems:"center",gap:5}}>
                <Icon n="nav" s={13} c={C.blue}/>Öffnen
              </a>
            )}
            <button style={btnG} onClick={()=>{setEditMap(e=>!e);setMapVal(pd.mapsLink||"");}}>
              {editMap?<Icon n="x" s={16}/>:<Icon n="edit" s={15} c={C.muted}/>}
            </button>
          </div>
        </div>
        {editMap&&(
          <div style={{marginTop:12}}>
            <input style={{...inp,marginBottom:8}} value={mapVal} onChange={e=>setMapVal(e.target.value)} placeholder="Google Maps Link einfügen..."/>
            <button style={{...btnP,padding:"9px 0"}} onClick={()=>{updPD(p=>({...p,mapsLink:mapVal.trim()}));setEditMap(false);}}>Speichern</button>
          </div>
        )}
        {!editMap&&!pd.mapsLink&&<div style={{fontSize:12,color:C.muted,marginTop:6}}>Kein Link – Stift zum Einfügen</div>}
      </div>
      {secs.map(s=>(
        <div key={s.key} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",cursor:"pointer"}} onClick={()=>onOpen(s)}>
            <span style={{fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{s.icon}</span>{s.label}</span>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {s.count!==null&&<span style={badge(s.count)}>{s.count}</span>}
              {s.key==="deviceType"&&<span style={{fontSize:12,color:C.muted}}>{pd.deviceType||"–"}</span>}
              {s.key==="otherNotes"&&<span style={{fontSize:12,color:C.muted}}>{pd.otherNotes?"vorhanden":"–"}</span>}
              <span style={{color:C.muted,fontSize:18}}>›</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SUB ROUTER ──
function Sub({sec,pd,updPD}){
  const k=sec.key;
  if(k==="isolationErrors") return <IsoSec pd={pd} updPD={updPD}/>;
  if(["powerBalanceOff","commErrors"].includes(k)) return <ListSec skey={k} pd={pd} updPD={updPD}/>;
  if(k==="defectiveDevices") return <DefSec pd={pd} updPD={updPD}/>;
  if(k==="deviceType") return <TxtSec label="Gerätetyp" value={pd.deviceType} onSave={v=>updPD(p=>({...p,deviceType:v}))}/>;
  if(k==="otherNotes") return <TxtSec label="Sonstige Notizen" value={pd.otherNotes} onSave={v=>updPD(p=>({...p,otherNotes:v}))} multi/>;
  return null;
}

function DelBtn({onClick}){
  return <button style={btnD} onClick={onClick}><Icon n="trash" s={15} c={C.red}/></button>;
}

// ── ISOLATION ──
const STR_OPTIONS=["1","2","3","4"];
const POL_OPTIONS=["–","+","-","+ und -"];

function IsoSec({pd,updPD}){
  const [nr,setNr]=useState(""); const [note,setNote]=useState("");
  const [strings,setStrings]=useState([]); const [pol,setPol]=useState("–");
  const [confirm,setConfirm]=useState(null);
  const items=pd.isolationErrors||[];
  const sorted=[...items].sort((a,b)=>(parseInt(a.nr.replace(/\D/g,""))||0)-(parseInt(b.nr.replace(/\D/g,""))||0));
  const toggleStr=s=>setStrings(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s].sort());
  const toggleAll=()=>setStrings(prev=>prev.length===4?[]:["1","2","3","4"]);
  const add=()=>{
    if(!nr.trim()) return;
    const strVal=strings.length===0?"–":strings.join(",");
    updPD(p=>({...p,isolationErrors:[...p.isolationErrors,{id:Date.now(),nr:nr.trim(),note:note.trim(),string:strVal,pol}]}));
    setNr("");setNote("");setStrings([]);setPol("–");
  };
  const del=id=>updPD(p=>({...p,isolationErrors:p.isolationErrors.filter(x=>x.id!==id)}));
  const displayStr=s=>{if(!s||s==="–") return null; if(s==="1,2,3,4") return "Alle Strings (1–4)"; return "String "+s.split(",").join(", ");};
  return (
    <div style={{padding:16}}>
      {confirm&&<Confirm msg={`"${confirm.nr}" wirklich löschen?`} onYes={()=>{del(confirm.id);setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{items.length} Einträge</div>
      {sorted.length===0&&<div style={{color:C.muted,fontSize:14,marginBottom:16}}>Keine Einträge</div>}
      {sorted.map(it=>(
        <div key={it.id} style={ROW}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{it.nr}</div>
            {it.string&&it.string!=="–"&&<div style={{fontSize:12,color:C.accent,marginTop:2}}>{displayStr(it.string)} · Pol: {it.pol||"–"}</div>}
            {it.note&&<div style={{fontSize:12,color:C.muted,marginTop:1}}>{it.note}</div>}
          </div>
          <DelBtn onClick={()=>setConfirm(it)}/>
        </div>
      ))}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:6}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600}}>Eintrag hinzufügen</div>
        <input style={inp} value={nr} onChange={e=>setNr(e.target.value)} placeholder="Gerätenummer (z.B. WR 202)"/>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>String {strings.length>0&&<span style={{color:C.accent}}>({strings.length===4?"Alle":strings.join(", ")})</span>}</div>
          <div style={{display:"flex",gap:6}}>
            {STR_OPTIONS.map(s=>{const on=strings.includes(s);return <button key={s} onClick={()=>toggleStr(s)} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${on?C.accent:C.border}`,background:on?"#78350f":"transparent",color:on?C.accent:C.muted,fontWeight:700,fontSize:15,cursor:"pointer"}}>{s}</button>;})}
            <button onClick={toggleAll} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${strings.length===4?C.accent:C.border}`,background:strings.length===4?"#78350f":"transparent",color:strings.length===4?C.accent:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Alle</button>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>Pol</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {POL_OPTIONS.map(o=>{const on=pol===o;return <button key={o} onClick={()=>setPol(o)} style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${on?C.blue:C.border}`,background:on?C.blueDim:"transparent",color:on?C.blue:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{o}</button>;})}
          </div>
        </div>
        <input style={inp} value={note} onChange={e=>setNote(e.target.value)} placeholder="Notiz (optional)" onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button style={btnP} onClick={add}>Hinzufügen</button>
      </div>
    </div>
  );
}

// ── GENERIC LIST ──
function ListSec({skey,pd,updPD}){
  const [nr,setNr]=useState(""); const [note,setNote]=useState(""); const [confirm,setConfirm]=useState(null);
  const items=pd[skey]||[];
  const sorted=[...items].sort((a,b)=>(parseInt(a.nr.replace(/\D/g,""))||0)-(parseInt(b.nr.replace(/\D/g,""))||0));
  const add=()=>{if(!nr.trim()) return; updPD(p=>({...p,[skey]:[...p[skey],{id:Date.now(),nr:nr.trim(),note:note.trim()}]})); setNr("");setNote("");};
  const del=id=>updPD(p=>({...p,[skey]:p[skey].filter(x=>x.id!==id)}));
  return (
    <div style={{padding:16}}>
      {confirm&&<Confirm msg={`"${confirm.nr}" wirklich löschen?`} onYes={()=>{del(confirm.id);setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{items.length} Einträge</div>
      {sorted.length===0&&<div style={{color:C.muted,fontSize:14,marginBottom:16}}>Keine Einträge</div>}
      {sorted.map(it=>(
        <div key={it.id} style={ROW}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{it.nr}</div>
            {it.note&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{it.note}</div>}
          </div>
          <DelBtn onClick={()=>setConfirm(it)}/>
        </div>
      ))}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:6}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600}}>Eintrag hinzufügen</div>
        <input style={inp} value={nr} onChange={e=>setNr(e.target.value)} placeholder="Gerätenummer"/>
        <input style={inp} value={note} onChange={e=>setNote(e.target.value)} placeholder="Notiz (optional)" onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button style={btnP} onClick={add}>Hinzufügen</button>
      </div>
    </div>
  );
}

// ── DEFECTIVE ──
function DefSec({pd,updPD}){
  const [nr,setNr]=useState(""); const [serial,setSerial]=useState(""); const [confirm,setConfirm]=useState(null);
  const devices=pd.defectiveDevices||[];
  const sorted=[...devices].sort((a,b)=>(parseInt(a.nr.replace(/\D/g,""))||0)-(parseInt(b.nr.replace(/\D/g,""))||0));
  const tog=(id,f)=>updPD(p=>({...p,defectiveDevices:p.defectiveDevices.map(d=>d.id===id?{...d,[f]:!d[f]}:d)}));
  const del=id=>updPD(p=>({...p,defectiveDevices:p.defectiveDevices.filter(d=>d.id!==id)}));
  const add=()=>{if(!nr.trim()) return; updPD(p=>({...p,defectiveDevices:[...p.defectiveDevices,{id:Date.now(),nr:nr.trim(),serialNr:serial.trim(),removed:false,reported:false}]})); setNr("");setSerial("");};
  return (
    <div style={{padding:16}}>
      {confirm&&<Confirm msg={`"${confirm.nr}" wirklich entfernen?`} onYes={()=>{del(confirm.id);setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{devices.length} defekte Geräte</div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <div style={{flex:1,fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>Gerät</div>
        <div style={{fontSize:11,color:C.muted,fontWeight:700,width:76,textAlign:"center",textTransform:"uppercase"}}>Vor Ort</div>
        <div style={{fontSize:11,color:C.muted,fontWeight:700,width:76,textAlign:"center",textTransform:"uppercase"}}>Gemeldet</div>
        <div style={{width:38}}></div>
      </div>
      {sorted.map(d=>(
        <div key={d.id} style={{...ROW,gap:6}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14}}>{d.nr}</div>
            {d.serialNr&&<div style={{fontSize:11,color:C.muted}}>SN: {d.serialNr}</div>}
          </div>
          <button onClick={()=>tog(d.id,"removed")}  style={{...tag(d.removed), width:76,border:"none"}}>{d.removed?"Abgebaut":"Vor Ort"}</button>
          <button onClick={()=>tog(d.id,"reported")} style={{...tag(d.reported),width:76,border:"none"}}>{d.reported?"Gemeldet":"Offen"}</button>
          <DelBtn onClick={()=>setConfirm(d)}/>
        </div>
      ))}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:6}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600}}>Gerät hinzufügen</div>
        <input style={inp} value={nr}     onChange={e=>setNr(e.target.value)}     placeholder="Gerätenummer (z.B. WR 250)"/>
        <input style={inp} value={serial} onChange={e=>setSerial(e.target.value)} placeholder="Seriennummer (optional)" onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button style={btnP} onClick={add}>Gerät hinzufügen</button>
      </div>
    </div>
  );
}

// ── TEXT ──
function TxtSec({label,value,onSave,multi}){
  const [val,setVal]=useState(value||"");
  return (
    <div style={{padding:16}}>
      <div style={{fontSize:13,color:C.muted,marginBottom:12}}>{label}</div>
      {multi
        ?<textarea style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",resize:"vertical",minHeight:100}} value={val} onChange={e=>setVal(e.target.value)}/>
        :<input style={inp} value={val} onChange={e=>setVal(e.target.value)} placeholder={label+" eingeben..."}/>
      }
      <button style={{...btnP,marginTop:8}} onClick={()=>onSave(val)}>Speichern</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
