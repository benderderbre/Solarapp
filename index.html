<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar Monitor</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0b1120; font-family:'Inter',system-ui,sans-serif; color:#e2e8f0; }
    input,textarea,button { font-family:inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = "solarapp_v3";
function loadData() { try { const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch{} return null; }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

const PLANT_NAMES = [
  "Burk","Buxheim","Dach Insys","Dachanlage Bogdahn","Egweil",
  "Ellingen I","Ellingen II","Ellingen III","Ellingen IV","Ergoldsbach",
  "Gardelegen","Großmehring","Hohenfels","Hohenfels II","Irlbach",
  "Jabel","Mainsondheim Komplett","Markt Bibart","Neuburg",
  "Offingen I","Offingen II","Offingen III","Offingen IV",
  "Perkam I","Perkam II","Rannungen I","Rannungen II","Roden",
  "Schierling I-1","Schierling II","Schierling III",
  "Unterspiesheim","Windischeschenbach","Zeitlarn","Zirndorf",
];

function pid(n){ return "p_"+n.toLowerCase().replace(/[^a-z0-9]/g,"_"); }
const EMPTY = () => ({isolationErrors:[],defectiveDevices:[],powerBalanceOff:[],deviceType:"",otherNotes:"",commErrors:[]});

const GM_DEVICES = [
  {id:1,nr:"WR 10"},{id:2,nr:"WR 11"},{id:3,nr:"WR 12"},{id:4,nr:"WR 57"},
  {id:5,nr:"WR 60"},{id:6,nr:"WR 63"},{id:7,nr:"WR 113"},{id:8,nr:"WR 163"},
  {id:9,nr:"WR 164"},{id:10,nr:"WR 165"},{id:11,nr:"WR 202"},{id:12,nr:"WR 205"},
  {id:13,nr:"WR 208"},{id:14,nr:"WR 215"},{id:15,nr:"WR 218"},{id:16,nr:"WR 221"},
  {id:17,nr:"WR 226"},{id:18,nr:"WR 235"},{id:19,nr:"WR 236"},{id:20,nr:"WR 237"},
  {id:21,nr:"WR 239"},{id:22,nr:"WR 241"},{id:23,nr:"WR 245"},
].map(d=>({...d,serialNr:"",removed:false,reported:true}));

const INITIAL_DATA = {
  plants: PLANT_NAMES.map(n=>({id:pid(n),name:n})),
  plantData: Object.fromEntries(PLANT_NAMES.map(n=>[pid(n), n==="Großmehring" ? {
    isolationErrors:[],
    defectiveDevices: GM_DEVICES,
    powerBalanceOff:[{id:1,nr:"WR (Power Balancer off)",note:"Klemmkasten braucht Tausch – Kasten vorhanden aber keine Klemmen. T-Stück defekt – evtl. abklären bei B Electric."}],
    deviceType:"Wechselrichter (WR)",
    otherNotes:"Klemmkasten braucht Tausch. Kasten vorhanden aber keine Klemmen. T-Stück defekt – evtl. abklären bei B Electric.",
    commErrors:[],
  } : EMPTY()])),
};

const USERS = [
  {username:"admin",    password:"admin123",  name:"Admin"},
  {username:"marco",    password:"8501marco", name:"Marco"},
  {username:"tom",      password:"8501tom",   name:"Tom"},
  {username:"julian",   password:"8501julian",name:"Julian"},
  {username:"johannes", password:"johan8501", name:"Johannes"},
  {username:"henry",    password:"henry8501", name:"Henry"},
  {username:"jaworski", password:"rocki8501", name:"Jaworski"},
];

const C = {
  bg:"#0b1120",surface:"#131f35",card:"#1a2a42",border:"#243654",
  accent:"#f59e0b",red:"#ef4444",redDim:"#450a0a",
  green:"#22c55e",greenDim:"#052e16",text:"#e2e8f0",muted:"#64748b",
};
const inp  = {width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.text,fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:16};
const btnP = {width:"100%",background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"12px 0",fontWeight:700,fontSize:15,cursor:"pointer"};
const btnD = {background:C.redDim,color:C.red,border:`1px solid ${C.red}`,borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:600};
const btnG = {background:"transparent",color:C.muted,border:"none",cursor:"pointer",fontSize:14,padding:"6px 10px"};
const ROW  = {background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10};
const tag  = ok=>({fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:20,background:ok?C.greenDim:C.redDim,color:ok?C.green:C.red,border:`1px solid ${ok?C.green:C.red}`,cursor:"pointer"});
const badge= n=>({background:n>0?C.redDim:C.greenDim,color:n>0?C.red:C.green,borderRadius:20,padding:"3px 12px",fontSize:13,fontWeight:700,border:`1px solid ${n>0?C.red:C.green}`});

function faults(pd){ return pd.isolationErrors.length+pd.defectiveDevices.length+pd.powerBalanceOff.length+pd.commErrors.length; }

// ── APP ──
function App(){
  const [user,setUser]   = useState(null);
  const [db,setDb]       = useState(()=>loadData()||INITIAL_DATA);
  const [view,setView]   = useState("home");
  const [plant,setPlant] = useState(null);
  const [sec,setSec]     = useState(null);

  useEffect(()=>{ saveData(db); },[db]);

  const updPD = (id,fn) => setDb(prev=>({...prev,plantData:{...prev.plantData,[id]:fn(prev.plantData[id])}}));

  if(!user) return <Login onLogin={setUser}/>;
  const pd = plant ? (db.plantData[plant.id]||EMPTY()) : null;

  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {view!=="home" && <button style={btnG} onClick={()=>{ if(view==="sub"){setView("detail");setSec(null);} else{setView("home");setPlant(null);} }}>← Zurück</button>}
          {view==="home" && <span>☀️</span>}
          <span style={{fontWeight:800,fontSize:17,color:C.accent}}>
            {view==="home"?"Alle Anlagen":view==="detail"?plant?.name:sec?.label}
          </span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12,color:C.muted}}>{user.name}</span>
          <button style={btnG} onClick={()=>{setUser(null);setView("home");setPlant(null);setSec(null);}}>⎋</button>
        </div>
      </div>

      {view==="home" && <Home db={db} onSelect={p=>{setPlant(p);setView("detail");}} onAdd={name=>{const id=pid(name);setDb(prev=>({plants:[...prev.plants,{id,name}],plantData:{...prev.plantData,[id]:EMPTY()}}));}}/>}
      {view==="detail" && plant && <Detail plant={plant} pd={pd} onRename={name=>{setDb(prev=>({...prev,plants:prev.plants.map(p=>p.id===plant.id?{...p,name}:p)}));setPlant(p=>({...p,name}));}} onOpen={s=>{setSec(s);setView("sub");}} updPD={fn=>updPD(plant.id,fn)}/>}
      {view==="sub" && plant && sec && <Sub sec={sec} pd={pd} updPD={fn=>updPD(plant.id,fn)}/>}
    </div>
  );
}

// ── LOGIN ──
function Login({onLogin}){
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [show,setShow]=useState(false); const [err,setErr]=useState("");
  const go=()=>{ const f=USERS.find(x=>x.username===u.trim()&&x.password===p); if(f) onLogin(f); else setErr("Benutzername oder Passwort falsch."); };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${C.bg},#0d1f3c)`}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"40px 32px",width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,0.5)"}}>
        <div style={{fontSize:32,marginBottom:8}}>☀️</div>
        <div style={{fontSize:24,fontWeight:800,color:C.accent,marginBottom:4}}>Solar Monitor</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:24}}>Anlagenverwaltung & Störungserfassung</div>
        <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>Benutzername</label>
        <input style={inp} value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="z.B. marco"/>
        <label style={{display:"block",fontSize:11,color:C.muted,marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>Passwort</label>
        <div style={{position:"relative",marginBottom:16}}>
          <input style={{...inp,marginBottom:0,paddingRight:44}} type={show?"text":"password"} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••"/>
          <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.muted,padding:0}}>{show?"🙈":"👁️"}</button>
        </div>
        {err && <div style={{color:C.red,fontSize:13,marginBottom:10}}>{err}</div>}
        <button style={btnP} onClick={go}>Anmelden</button>
      </div>
    </div>
  );
}

// ── HOME ──
function Home({db,onSelect,onAdd}){
  const [name,setName]=useState("");
  const sorted=[...db.plants].sort((a,b)=>a.name.localeCompare(b.name,"de"));
  return (
    <div style={{padding:16}}>
      <div style={{fontSize:12,color:C.muted,marginBottom:12}}>{sorted.length} Anlagen</div>
      {sorted.map(p=>{
        const pd=db.plantData[p.id]||EMPTY(); const f=faults(pd);
        return (
          <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>onSelect(p)}>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>{p.name}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:3}}>Iso: {pd.isolationErrors.length} · Defekt: {pd.defectiveDevices.length} · PB: {pd.powerBalanceOff.length} · Komm: {pd.commErrors.length}</div>
            </div>
            <span style={badge(f)}>{f>0?`${f} Fehler`:"OK"}</span>
          </div>
        );
      })}
      <div style={{marginTop:20,borderTop:`1px solid ${C.border}`,paddingTop:16}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600}}>Neue Anlage</div>
        <div style={{display:"flex",gap:8}}>
          <input style={{...inp,marginBottom:0,flex:1}} value={name} onChange={e=>setName(e.target.value)} placeholder="Anlagenname" onKeyDown={e=>{if(e.key==="Enter"&&name.trim()){onAdd(name.trim());setName("");}}}/>
          <button style={{...btnP,width:"auto",padding:"10px 18px"}} onClick={()=>{if(name.trim()){onAdd(name.trim());setName("");}}}>+</button>
        </div>
      </div>
    </div>
  );
}

// ── DETAIL ──
function Detail({plant,pd,onRename,onOpen,updPD}){
  const [ren,setRen]=useState(false); const [nm,setNm]=useState(plant.name);
  const secs=[
    {key:"isolationErrors", label:"Isolationsfehler",     icon:"⚡", count:pd.isolationErrors.length},
    {key:"defectiveDevices",label:"Defekte Geräte",        icon:"🔧", count:pd.defectiveDevices.length},
    {key:"powerBalanceOff", label:"Power Balance Off",     icon:"🔌", count:pd.powerBalanceOff.length},
    {key:"commErrors",      label:"Kommunikationsstörung", icon:"📡", count:pd.commErrors.length},
    {key:"deviceType",      label:"Gerätetyp",             icon:"⚙️", count:null},
    {key:"otherNotes",      label:"Sonstige Notizen",      icon:"📝", count:null},
  ];
  return (
    <div style={{padding:16}}>
      {ren ? (
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
          <input style={{...inp,marginBottom:0,flex:1}} value={nm} onChange={e=>setNm(e.target.value)}/>
          <button style={{...btnP,width:"auto",padding:"10px 16px"}} onClick={()=>{onRename(nm.trim());setRen(false);}}>✓</button>
          <button style={btnG} onClick={()=>setRen(false)}>✕</button>
        </div>
      ) : (
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <span style={{fontWeight:700,fontSize:15}}>{plant.name}</span>
          <button style={btnG} onClick={()=>setRen(true)}>✏️</button>
        </div>
      )}
      {secs.map(s=>(
        <div key={s.key} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",cursor:"pointer"}} onClick={()=>onOpen(s)}>
            <span style={{fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{s.icon}</span>{s.label}</span>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {s.count!==null && <span style={badge(s.count)}>{s.count}</span>}
              {s.key==="deviceType"  && <span style={{fontSize:12,color:C.muted}}>{pd.deviceType||"–"}</span>}
              {s.key==="otherNotes" && <span style={{fontSize:12,color:C.muted}}>{pd.otherNotes?"vorhanden":"–"}</span>}
              <span style={{color:C.muted}}>›</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SUB ROUTER ──
function Sub({sec,pd,updPD}){
  const k=sec.key;
  if(["isolationErrors","powerBalanceOff","commErrors"].includes(k)) return <ListSec skey={k} pd={pd} updPD={updPD}/>;
  if(k==="defectiveDevices") return <DefSec pd={pd} updPD={updPD}/>;
  if(k==="deviceType") return <TxtSec label="Gerätetyp" value={pd.deviceType} onSave={v=>updPD(p=>({...p,deviceType:v}))}/>;
  if(k==="otherNotes") return <TxtSec label="Sonstige Notizen" value={pd.otherNotes} onSave={v=>updPD(p=>({...p,otherNotes:v}))} multi/>;
  return null;
}

// ── LIST ──
function ListSec({skey,pd,updPD}){
  const [nr,setNr]=useState(""); const [note,setNote]=useState("");
  const items=pd[skey]||[];
  const sorted=[...items].sort((a,b)=>(parseInt(a.nr.replace(/\D/g,""))||0)-(parseInt(b.nr.replace(/\D/g,""))||0));
  const add=()=>{ if(!nr.trim()) return; updPD(p=>({...p,[skey]:[...p[skey],{id:Date.now(),nr:nr.trim(),note:note.trim()}]})); setNr(""); setNote(""); };
  const del=id=>updPD(p=>({...p,[skey]:p[skey].filter(x=>x.id!==id)}));
  return (
    <div style={{padding:16}}>
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{items.length} Einträge – numerisch sortiert</div>
      {sorted.length===0 && <div style={{color:C.muted,fontSize:14,marginBottom:16}}>Keine Einträge</div>}
      {sorted.map(it=>(
        <div key={it.id} style={ROW}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{it.nr}</div>
            {it.note && <div style={{fontSize:12,color:C.muted,marginTop:2}}>{it.note}</div>}
          </div>
          <button style={btnD} onClick={()=>del(it.id)}>🗑</button>
        </div>
      ))}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:6}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600}}>Eintrag hinzufügen</div>
        <input style={inp} value={nr} onChange={e=>setNr(e.target.value)} placeholder="Gerätenummer (z.B. WR 202)"/>
        <input style={inp} value={note} onChange={e=>setNote(e.target.value)} placeholder="Notiz (optional)" onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button style={btnP} onClick={add}>Hinzufügen</button>
      </div>
    </div>
  );
}

// ── DEFECTIVE ──
function DefSec({pd,updPD}){
  const [nr,setNr]=useState(""); const [serial,setSerial]=useState("");
  const devices=pd.defectiveDevices||[];
  const sorted=[...devices].sort((a,b)=>(parseInt(a.nr.replace(/\D/g,""))||0)-(parseInt(b.nr.replace(/\D/g,""))||0));
  const tog=(id,f)=>updPD(p=>({...p,defectiveDevices:p.defectiveDevices.map(d=>d.id===id?{...d,[f]:!d[f]}:d)}));
  const del=id=>updPD(p=>({...p,defectiveDevices:p.defectiveDevices.filter(d=>d.id!==id)}));
  const add=()=>{ if(!nr.trim()) return; updPD(p=>({...p,defectiveDevices:[...p.defectiveDevices,{id:Date.now(),nr:nr.trim(),serialNr:serial.trim(),removed:false,reported:false}]})); setNr(""); setSerial(""); };
  return (
    <div style={{padding:16}}>
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{devices.length} defekte Geräte</div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <div style={{flex:1,fontSize:11,color:C.muted,fontWeight:700}}>GERÄT</div>
        <div style={{fontSize:11,color:C.muted,fontWeight:700,width:80,textAlign:"center"}}>ABGEBAUT</div>
        <div style={{fontSize:11,color:C.muted,fontWeight:700,width:80,textAlign:"center"}}>GEMELDET</div>
        <div style={{width:36}}></div>
      </div>
      {sorted.map(d=>(
        <div key={d.id} style={{...ROW,gap:6}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14}}>{d.nr}</div>
            {d.serialNr && <div style={{fontSize:11,color:C.muted}}>SN: {d.serialNr}</div>}
          </div>
          <button onClick={()=>tog(d.id,"removed")}  style={{...tag(d.removed), width:80,border:"none"}}>{d.removed?"Abgebaut":"Vor Ort"}</button>
          <button onClick={()=>tog(d.id,"reported")} style={{...tag(d.reported),width:80,border:"none"}}>{d.reported?"Gemeldet":"Offen"}</button>
          <button style={btnD} onClick={()=>del(d.id)}>🗑</button>
        </div>
      ))}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:6}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600}}>Gerät hinzufügen</div>
        <input style={inp} value={nr}     onChange={e=>setNr(e.target.value)}     placeholder="Gerätenummer (z.B. WR 250)"/>
        <input style={inp} value={serial} onChange={e=>setSerial(e.target.value)} placeholder="Seriennummer (optional)" onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button style={btnP} onClick={add}>Gerät hinzufügen</button>
      </div>
    </div>
  );
}

// ── TEXT ──
function TxtSec({label,value,onSave,multi}){
  const [val,setVal]=useState(value||"");
  return (
    <div style={{padding:16}}>
      <div style={{fontSize:13,color:C.muted,marginBottom:12}}>{label}</div>
      {multi
        ? <textarea style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",resize:"vertical",minHeight:100}} value={val} onChange={e=>setVal(e.target.value)}/>
        : <input style={inp} value={val} onChange={e=>setVal(e.target.value)} placeholder={label+" eingeben..."}/>
      }
      <button style={{...btnP,marginTop:8}} onClick={()=>onSave(val)}>Speichern</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
